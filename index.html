<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ──────────────────────────────────────────────── -->
    <title>PyPath — Master Python. One Concept at a Time.</title>
    <meta name="description" content="PyPath is a free, structured Python curriculum with 200+ topics across 5 skill levels — from beginner syntax to CPython internals. Learn Python the right way." />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f1117" />

    <!-- ── Canonical ─────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://www.py-path.com/" />

    <!-- ── Favicon & Icons ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.py-path.com/" />
    <meta property="og:title"       content="PyPath — Master Python. One Concept at a Time." />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="PyPath — Python Learning Platform" />
    <meta property="og:site_name"   content="PyPath" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@pypath_dev" />
    <meta name="twitter:title"       content="PyPath — Master Python. One Concept at a Time." />
    <meta name="twitter:description" content="Free structured Python curriculum — 200+ topics, interactive editor, 5 skill levels from beginner to mastery." />
    <meta name="twitter:image"       content="https://www.py-path.com/og-image.png" />

    <!-- ── JSON-LD Structured Data ───────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://www.py-path.com/#website",
          "url": "https://www.py-path.com/",
          "name": "PyPath",
          "description": "Free, structured Python learning curriculum with 200+ topics across 5 skill levels.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.py-path.com/curriculum?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Course",
          "@id": "https://www.py-path.com/#course",
          "name": "Python Mastery Curriculum",
          "description": "A comprehensive, free Python programming curriculum covering 200+ topics from beginner syntax to advanced CPython internals, concurrency, and real-world systems.",
          "provider": {
            "@type": "Organization",
            "name": "PyPath",
            "url": "https://www.py-path.com"
          },
          "url": "https://www.py-path.com/curriculum",
          "educationalLevel": ["Beginner", "Intermediate", "Advanced", "Expert"],
          "teaches": [
            "Python syntax and variables",
            "Object-oriented programming",
            "Data structures and algorithms",
            "Concurrency and async programming",
            "Python interview preparation",
            "CPython internals"
          ],
          "courseMode": "online",
          "isAccessibleForFree": true,
          "inLanguage": "en",
          "hasCourseInstance": {
            "@type": "CourseInstance",
            "courseMode": "online",
            "instructor": {
              "@type": "Organization",
              "name": "PyPath"
            }
          }
        },
        {
          "@type": "Organization",
          "@id": "https://www.py-path.com/#organization",
          "name": "PyPath",
          "url": "https://www.py-path.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.py-path.com/favicon.svg"
          }
        }
      ]
    }
    </script>

    <!-- ── Fonts ──────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>
